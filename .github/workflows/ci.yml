name: Build and Generate Video

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sim-base-video-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg and Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk >/dev/null

      - name: Install dependencies
        run: npm install --silent

      - name: Type-check and build web app
        run: npm run build

      - name: Generate titled vertical MP4
        run: npm run generate:video

      - name: Verify completed video output
        shell: bash
        run: |
          mapfile -t files < <(find output -maxdepth 1 -type f -printf '%f\n')
          if [ "${#files[@]}" -ne 1 ] || [[ "${files[0]}" != *.mp4 ]]; then
            printf 'Expected exactly one MP4, found:\n'
            printf '%s\n' "${files[@]}"
            exit 1
          fi
          ls -lh "output/${files[0]}"

      - name: Upload completed video
        uses: actions/upload-artifact@v4
        with:
          name: sim-base-video-${{ github.run_number }}
          path: output/*.mp4
          if-no-files-found: error
          retention-days: 14
