name: Build and Generate Video

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sim-base-video-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg and Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install dependencies
        run: npm install

      - name: Type-check and build web app
        run: npm run build

      - name: Generate vertical MP4
        run: npm run generate:video

      - name: Show generated files
        run: ls -lh output

      - name: Upload generated video
        uses: actions/upload-artifact@v4
        with:
          name: sim-base-video-${{ github.run_number }}
          path: |
            output/*.mp4
            output/*.json
          if-no-files-found: error
          retention-days: 14
