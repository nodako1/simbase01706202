name: Build and Generate Video

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sim-base-video-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg and Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk >/dev/null

      - name: Install dependencies
        run: npm install --silent

      - name: Type-check and build web app
        run: npm run build

      - name: Generate vertical MP4
        shell: bash
        run: |
          set -o pipefail
          npm run generate:video 2>&1 | tee video-generation.log

      - name: Upload generation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: video-generation-diagnostics-${{ github.run_number }}
          path: video-generation.log
          if-no-files-found: error
          retention-days: 3

      - name: Show generated files
        run: ls -lh output

      - name: Upload generated video
        uses: actions/upload-artifact@v4
        with:
          name: sim-base-video-${{ github.run_number }}
          path: |
            output/*.mp4
            output/*.json
          if-no-files-found: error
          retention-days: 14
